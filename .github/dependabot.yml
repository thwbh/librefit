# LibreFit Dependabot Configuration
# Automated dependency updates and security scanning.
#
# Note on auto-merge: Dependabot has no auto-merge setting in this file. To
# auto-merge (e.g. low-severity/patch updates), add a separate GitHub Actions
# workflow that runs `gh pr merge --auto` on `dependabot/*` PRs, plus enable
# "Allow auto-merge" + branch protection in repo settings.

version: 2
updates:
  # npm dependencies (JavaScript/TypeScript)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Europe/Vienna"
    open-pull-requests-limit: 10
    reviewers:
      - "thwbh"
    assignees:
      - "thwbh"
    labels:
      - "devops"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    groups:
      # Group non-major updates together
      npm-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "@sveltejs/*"
          - "svelte"
          - "vite"
          - "@tauri-apps/*"
      # Group security updates into their own PR set
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
    ignore:
      # Vitest UI server vulnerability does not affect our CLI-only usage.
      - dependency-name: "vitest"
        versions: [">=3.0.0 <4.1.0"]
      # Cookie parsing in a transitive dep through SvelteKit; validation in place.
      - dependency-name: "cookie"
        versions: [">=0.0.0 <0.7.0"]

  # Rust dependencies (Cargo)
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "daily"
      time: "09:30"
      timezone: "Europe/Vienna"
    open-pull-requests-limit: 10
    reviewers:
      - "thwbh"
    assignees:
      - "thwbh"
    labels:
      - "devops"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      cargo-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      cargo-security:
        applies-to: security-updates
        patterns:
          - "*"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "10:00"
      timezone: "Europe/Vienna"
    open-pull-requests-limit: 10
    reviewers:
      - "thwbh"
    assignees:
      - "thwbh"
    labels:
      - "devops"
    commit-message:
      prefix: "chore"
      include: "scope"
